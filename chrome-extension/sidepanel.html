<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LeadArrow Dialer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:100%;min-height:100vh;
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:#030407;color:#e2e8f0;
  display:flex;flex-direction:column
}
.glass{
  background:rgba(10,11,14,0.5);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:12px;
  box-shadow:0 12px 40px rgba(0,0,0,0.6)
}
.header{
  display:flex;align-items:center;gap:8px;padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.04)
}
.header .brand{font-size:13px;font-weight:800;color:#fff;letter-spacing:0.18em}
.header .status-badge{
  margin-left:auto;font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.1em;
  padding:3px 8px;border-radius:20px;
  background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#34d399
}
.content{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px}
.lead-context{padding:14px}
.lead-context h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.lead-context p{font-size:12px;color:#64748b;line-height:1.5}
.lead-context .label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px}
.call-controls{display:flex;gap:10px;margin-top:4px}
.btn-accept{
  flex:1;padding:16px;border:none;border-radius:50%;
  background:#10b981;color:#fff;font-size:24px;cursor:pointer;
  box-shadow:0 0 15px rgba(16,185,129,0.4);transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;aspect-ratio:1
}
.btn-accept:hover{background:#059669;transform:scale(1.03)}
.btn-decline{
  flex:1;padding:16px;border:none;border-radius:50%;
  background:#ef4444;color:#fff;font-size:24px;cursor:pointer;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;aspect-ratio:1
}
.btn-decline:hover{background:#dc2626;transform:scale(1.03)}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.info-row .lbl{font-size:11px;color:#475569}
.info-row .val{font-size:11px;color:#e2e8f0;font-weight:600}
.followup-alert{
  padding:12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);
  border-radius:10px;text-align:center
}
.followup-alert h4{font-size:13px;color:#f87171;margin-bottom:4px}
.followup-alert p{font-size:11px;color:#fca5a5}
.followup-alert button{
  margin-top:8px;padding:8px 16px;border:none;border-radius:8px;
  background:#1A5CFF;color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s
}
.followup-alert button:hover{background:#0043F0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#475569}
.empty-state .phone-icon{font-size:36px;opacity:0.3}
.empty-state p{font-size:13px}
.mock-banner{
  padding:8px 12px;font-size:10px;color:#F1C40F;
  background:rgba(241,196,15,0.05);border-bottom:1px solid rgba(241,196,15,0.1);
  text-align:center
}
@keyframes blinkAlert{0%,100%{opacity:1}50%{opacity:0.6}}
.blink{animation:blinkAlert 1.2s ease-in-out infinite}
</style>
</head>
<body>
<div class="header">
  <span style="font-size:16px">&#x260E;</span>
  <span class="brand">LEADARROW</span>
  <span class="status-badge" id="live-badge">Live</span>
</div>
<div id="mock-banner" class="mock-banner hidden">Standalone Mock Mode — Backend Offline</div>
<div class="content">
  <div id="empty-state" class="empty-state">
    <div class="phone-icon">&#x260E;</div>
    <p>No active call</p>
  </div>
  <div id="call-panel" class="hidden">
    <div class="lead-context glass">
      <div class="label">Inbound Lead</div>
      <h3 id="lead-name-display">—</h3>
      <p id="lead-source-display">Source: —</p>
    </div>
    <div class="glass" style="padding:12px">
      <div class="info-row"><span class="lbl">Status</span><span class="val" id="call-status-display">Idle</span></div>
      <div class="info-row"><span class="lbl">Duration</span><span class="val" id="call-duration-display">00:00</span></div>
      <div class="info-row"><span class="lbl">Number</span><span class="val" id="call-number-display">—</span></div>
    </div>
    <div class="call-controls">
      <button id="accept-call-btn" class="btn-accept" title="Accept Call">&#10003;</button>
      <button id="decline-call-btn" class="btn-decline" title="Hang Up">&#10007;</button>
    </div>
  </div>
  <div id="followup-panel" class="hidden followup-alert blink">
    <h4>&#x1F6A8; CRM Follow-Up Reminder!</h4>
    <p id="followup-text">Follow-up reminder — call lead now.</p>
    <button id="followup-call-btn">Call Now</button>
  </div>
</div>
<script src="sidepanel.js"></script>
</body>
</html>
