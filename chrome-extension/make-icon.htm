<!DOCTYPE html>
<html>
<body>
  <canvas id="c" width="128" height="128"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#2563EB';
    ctx.beginPath();
    ctx.arc(64, 64, 60, 0, Math.PI * 2);
    ctx.fill();

    // White arrow
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(30, 64);
    ctx.lineTo(90, 64);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(70, 44);
    ctx.lineTo(90, 64);
    ctx.lineTo(70, 84);
    ctx.stroke();

    // Convert to download link
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'icon128.png';
      a.textContent = 'Click here to download icon128.png';
      document.body.appendChild(a);
    });
  </script>
</body>
</html>
