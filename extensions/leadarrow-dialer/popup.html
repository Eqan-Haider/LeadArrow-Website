<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadArrow Agent Comm Node</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 260px;
      background: #0b0f19;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ---- glass card ---- */
    .card {
      background: rgba(12, 16, 23, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.9);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(
        circle at 30% 20%,
        rgba(6, 182, 212, 0.04) 0%,
        transparent 60%
      );
      pointer-events: none;
    }

    /* ---- header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ---- status badge ---- */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      transition: all 0.25s ease;
      position: relative;
      z-index: 1;
    }

    .status-badge.idle {
      background: rgba(100, 116, 139, 0.15);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .status-badge.dialing {
      background: rgba(234, 179, 8, 0.12);
      color: #fbbf24;
      border: 1px solid rgba(234, 179, 8, 0.25);
      animation: pulse-dial 1.2s ease-in-out infinite;
    }

    .status-badge.oncall {
      background: rgba(34, 211, 238, 0.10);
      color: #22d3ee;
      border: 1px solid rgba(34, 211, 238, 0.25);
      animation: pulse-call 1.6s ease-in-out infinite;
    }

    @keyframes pulse-dial {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.15); }
      50%      { box-shadow: 0 0 0 6px rgba(234, 179, 8, 0.05); }
    }

    @keyframes pulse-call {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.12); }
      50%      { box-shadow: 0 0 0 8px rgba(34, 211, 238, 0.04); }
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .status-dot.idle     { background: #64748b; }
    .status-dot.dialing  { background: #fbbf24; animation: blink 0.8s step-end infinite; }
    .status-dot.oncall   { background: #22d3ee; animation: blink 1s step-end infinite; }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ---- timer ---- */
    .timer-section {
      text-align: center;
      padding: 12px 0 10px;
      position: relative;
      z-index: 1;
    }

    .timer-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #64748b;
      margin-bottom: 4px;
    }

    .timer-display {
      font-size: 42px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      transition: color 0.3s ease;
    }

    .timer-display.idle    { color: #475569; }
    .timer-display.dialing { color: #fbbf24; }
    .timer-display.oncall  { color: #22d3ee; text-shadow: 0 0 20px rgba(34, 211, 238, 0.15); }

    .timer-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
      min-height: 16px;
    }

    /* ---- lead info ---- */
    .lead-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 2px 0 8px;
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e1;
      position: relative;
      z-index: 1;
    }

    .lead-row .label {
      color: #64748b;
      font-weight: 400;
    }

    /* ---- actions ---- */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }

    .actions button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-terminate {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: #fff;
      box-shadow: 0 4px 14px rgba(220, 38, 38, 0.25);
    }

    .btn-terminate:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(220, 38, 38, 0.35);
    }

    .btn-terminate:active {
      transform: translateY(0);
    }

    .btn-terminate:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ---- radar ring ---- */
    .radar {
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid rgba(34, 211, 238, 0.06);
      pointer-events: none;
      z-index: 0;
    }

    .radar.active {
      border-color: rgba(34, 211, 238, 0.12);
      animation: radar-ping 2s ease-out infinite;
    }

    .radar.active::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background: #22d3ee;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.5);
    }

    @keyframes radar-ping {
      0%   { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.08); }
      70%  { box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="radar" id="radarRing"></div>

  <!-- HEADER -->
  <div class="header">
    <h1>LeadArrow Agent Comm Node</h1>
    <div class="header-badge">
      <span class="status-badge idle" id="statusBadge">
        <span class="status-dot idle" id="statusDot"></span>
        <span id="statusLabel">IDLE</span>
      </span>
    </div>
  </div>

  <!-- TIMER -->
  <div class="timer-section">
    <div class="timer-label">call duration</div>
    <div class="timer-display idle" id="timerDisplay">00:00</div>
    <div class="timer-sub" id="timerSub">&nbsp;</div>
  </div>

  <!-- LEAD INFO -->
  <div class="lead-row" id="leadRow">
    <span class="label">Agent:</span>
    <span id="leadName">—</span>
  </div>

  <!-- PAIRING SECTION -->
  <div id="pairingSection" style="display:none;margin-top:10px;padding:12px;border-radius:12px;background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.2);position:relative;z-index:1;">
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.8px;color:#fbbf24;margin-bottom:6px;">Pair Extension</div>
    <p style="font-size:10px;color:#94a3b8;margin-bottom:8px;">Enter your pairing code from the dashboard to receive lead alerts.</p>
    <div style="display:flex;gap:6px;">
      <input id="pairingInput" type="text" placeholder="Pairing code" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 10px;color:#fff;font-size:11px;outline:none;">
      <button id="btnPair" style="padding:6px 14px;border:none;border-radius:6px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:10px;font-weight:700;cursor:pointer;">Pair</button>
    </div>
    <div id="pairingError" style="display:none;font-size:9px;color:#ef4444;margin-top:6px;"></div>
  </div>

  <!-- LEAD ALERT -->
  <div id="leadAlert" style="display:none;margin-top:10px;padding:12px;border-radius:12px;background:rgba(99,68,227,0.10);border:1px solid rgba(99,68,227,0.25);position:relative;z-index:1;">
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.8px;color:#a78bfa;margin-bottom:6px;">Incoming Lead</div>
    <div id="leadAlertName" style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;"></div>
    <div id="leadAlertInfo" style="font-size:11px;color:#94a3b8;margin-bottom:10px;"></div>
    <div style="display:flex;gap:8px;">
      <button id="btnAccept" style="flex:1;padding:8px;border:none;border-radius:8px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;">&#10003; Accept</button>
      <button id="btnDecline" style="flex:1;padding:8px;border:none;border-radius:8px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;">&#10007; Decline</button>
    </div>
  </div>

  <!-- ALERT BREACH BANNER -->
  <div id="alertBadge" style="display:none;margin-top:8px;padding:6px 10px;border-radius:8px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;font-size:10px;font-weight:600;text-align:center;position:relative;z-index:1;"></div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn-terminate" id="btnTerminate" disabled>
      &#x274C; Terminate Stream
    </button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
